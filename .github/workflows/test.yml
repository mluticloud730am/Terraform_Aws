name: Terraform Multi Project

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        folder:
          - Day1-Terraform-basic-config
          - Day2-Terraform-all-config-files
          - Day3-Terraform-custom-var-configurations
          - Day4-StateFile
          - Day5-State-Local-Bakcup
          - Day5-State-Remote
          - Day6-State-locking-backend-true

    defaults:
      run:
        working-directory: ${{ matrix.folder }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID1 }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY1 }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan
